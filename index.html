<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="description" content="Practice handwriting with real-time similarity scoring. Works offline. Supports stylus, touch, and mouse.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Handwriting Trainer</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./img/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./img/icon-180.png">

  <!-- cup-ui design system -->
  <link rel="stylesheet" href="./vendor/cup-ui/tokens.css">
  <link rel="stylesheet" href="./vendor/cup-ui/reset.css">
  <link rel="stylesheet" href="./vendor/cup-ui/css/nano.css">
  <link rel="stylesheet" href="./vendor/cup-ui/css/micro.css">
  <link rel="stylesheet" href="./vendor/cup-ui/css/components.css">
  <!-- App-specific overrides -->
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>

  <header class="app-header">
    <div class="app-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M17 3a2.85 2.85 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
      </svg>
      Handwriting Trainer
    </div>
    <div class="header-actions">
      <button class="history-btn" id="history-btn" aria-label="View practice history" title="Practice history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <cup-button variant="outline" size="sm" id="install-btn" hidden>Install</cup-button>
    </div>
  </header>

  <div class="nav-row">
    <nav class="drill-nav" id="drill-nav" aria-label="Practice drills"></nav>
    <nav class="difficulty-nav" id="difficulty-nav" aria-label="Difficulty level"></nav>
  </div>

  <div class="letter-picker-wrap">
    <div id="letter-picker" class="letter-picker" role="tablist" aria-label="Choose an item to practice"></div>
  </div>

  <div class="controls-row">
    <div class="size-control">
      <cup-slider id="size-slider" label="Size" min="15" max="100" value="50" step="5" show-value></cup-slider>
    </div>
    <div class="font-control">
      <label class="font-control__label" for="font-select">Font</label>
      <select id="font-select" class="font-select" aria-label="Choose a font"></select>
      <label class="font-upload-btn" title="Load a custom font file">
        + Font
        <input type="file" id="font-file" accept=".ttf,.otf,.woff,.woff2" hidden>
      </label>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="draw-canvas" aria-label="Drawing canvas — trace the letter guide"></canvas>
  </div>

  <section class="score-section">
    <cup-progress id="score-bar" value="0" max="100" label="Overall" size="sm"></cup-progress>
    <div class="score-grid">
      <div class="score-card">
        <span class="cup-label" style="font-size:var(--cup-font-size-xs)">Accuracy</span>
        <div id="score-accuracy" class="score-value low">0%</div>
      </div>
      <div class="score-card">
        <span class="cup-label" style="font-size:var(--cup-font-size-xs)">Coverage</span>
        <div id="score-coverage" class="score-value low">0%</div>
      </div>
      <div class="score-card">
        <span class="cup-label" style="font-size:var(--cup-font-size-xs)">Smoothness</span>
        <div id="score-smoothness" class="score-value low">0%</div>
      </div>
      <div class="score-card">
        <span class="cup-label" style="font-size:var(--cup-font-size-xs)">Overall</span>
        <div id="score-overall" class="score-value low">0%</div>
      </div>
    </div>
  </section>

  <div class="controls">
    <cup-button variant="secondary" id="btn-prev" aria-label="Previous letter">&#9664;</cup-button>
    <cup-button variant="secondary" id="btn-clear">Clear</cup-button>
    <cup-button variant="secondary" id="btn-undo">Undo</cup-button>
    <cup-button variant="primary" id="btn-next" aria-label="Next letter">&#9654;</cup-button>
  </div>

  <div class="hint">
    Trace the guide with your stylus, finger, or mouse.
    <br>
    <kbd>←</kbd> <kbd>→</kbd> prev/next · <kbd>Esc</kbd> clear · <kbd>⌘Z</kbd> undo · type any key to jump
  </div>

  <!-- History panel (full-screen bottom sheet) -->
  <div class="history-panel" id="history-panel" role="dialog" aria-label="Practice history" aria-hidden="true">
    <div class="history-panel__inner">
      <div class="history-panel__header">
        <h2 class="history-panel__title">Practice History</h2>
        <button class="history-close" id="history-close" aria-label="Close history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="history-panel__actions">
        <button class="history-clear-btn" id="history-clear-btn">Clear All</button>
      </div>
      <div class="history-grid" id="history-grid"></div>
    </div>
  </div>

  <!-- cup-ui web components -->
  <script type="module" src="./vendor/cup-ui/cup.js?v=ee33dd4"></script>
  <script type="module" src="./js/app.js?v=ee33dd4"></script>
</body>
</html>
